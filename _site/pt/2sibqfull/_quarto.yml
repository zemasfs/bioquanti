project:
  type: book

book:
  title: "JSPlotly"
  sidebar:
    collapse-level: 1

  chapters:
    - index.qmd
    - part: part1.qmd
      chapters:
        - introd.qmd
        - tools.qmd
        - jsplotly.qmd
        - gsplotly.qmd

    - part: part2.qmd
      chapters:
        - funcionalidade.qmd
        - componentes.qmd
        - widgets.qmd
        - criacao.qmd

    - part: part3.qmd
      chapters:
        - virtual.qmd
        - fisico.qmd
        - potencial.qmd

bibliography: references.bib
lang: pt

format:
  html:
    theme:
      light: [zephyr, theme.scss]
      dark: [slate, theme.scss]
    page-layout: full
    toc: false
    css: miniproj.css

resources:
  - apps/**

include-in-header:
  - text: |
      <style>
        :root{
          --sidebar-width: 220px;
          --margin-sidebar-width: 240px;
          --content-max-width: 1600px;
        }

        .red { color: #e53935; }
        .blue { color: dodgerblue; }
        .darkblue { color: #003366; }
        .darkgreen { color: #006400; }
        .orange { color: #ff8c00; }
        .purple { color: #800080; }
        .note {
          color: #6f42c1;
          background: #f3e8ff;
          padding: 2px 6px;
          border-radius: 6px;
        }

        @media (min-width: 992px){
          #quarto-sidebar{
            width: var(--sidebar-width) !important;
            min-width: var(--sidebar-width) !important;
          }

          #quarto-margin-sidebar{
            width: var(--margin-sidebar-width) !important;
            min-width: var(--margin-sidebar-width) !important;
          }

          #quarto-content.page-columns{
            column-gap: 14px !important;
          }

          main.content{
            max-width: none !important;
            padding-left: 14px !important;
            padding-right: 14px !important;
            box-sizing: border-box !important;
          }
        }

        @media (max-width: 991.98px){
          #quarto-margin-sidebar{
            display: none !important;
          }

          main.content{
            width: 100% !important;
            max-width: none !important;
            padding-left: 14px !important;
            padding-right: 14px !important;
            box-sizing: border-box !important;
          }

          html, body{
            overflow-x: hidden !important;
          }

          img, video, canvas, svg, iframe{
            max-width: 100% !important;
            height: auto !important;
          }

          #quarto-sidebar{
            width: 86vw !important;
            max-width: 420px !important;
          }
        }

        .content p{
          margin-top: 0;
          margin-bottom: 1.2rem;
          line-height: 1.55;
        }

        .content p + p{
          margin-top: 0.8rem;
        }

        .callout p{
          margin-bottom: 0.8rem;
        }

        li p{
          margin-bottom: 0.6rem;
        }

        #sb-toggle{
          position: fixed;
          top: 12px;
          left: 12px;
          z-index: 10000;
          border-radius: 999px;
          padding: 8px 10px;
          box-shadow: 0 4px 10px rgba(0,0,0,.15);
        }

        body.sb-hidden #quarto-sidebar,
        body.sb-hidden #quarto-sidebar-glass,
        body.sb-hidden #quarto-margin-sidebar{
          display: none !important;
        }

        body.sb-hidden .page-columns{
          grid-template-columns: 1fr !important;
        }

        body.sb-hidden main.content{
          grid-column: 1 / -1 !important;
        }
      </style>

  - text: |
      <style>
        :root{
          --lv-sidebar-w: 330px;
          --lv-side-solid: #e8f0ff;
          --lv-main-solid: #f5f8fc;
        }
        #quarto-sidebar{ background: var(--lv-side-solid) !important; }
        main.content,
        #quarto-margin-sidebar{
          background: var(--lv-main-solid) !important;
        }
        #quarto-content.page-columns{ gap: 10px 16px; }
        #quarto-sidebar{ width: var(--lv-sidebar-w); }
      </style>


include-after-body:
  text: |
    <button id="sb-toggle" class="btn btn-light" title="Sidebar" aria-label="Sidebar">
      <i class="bi bi-layout-text-sidebar-reverse"></i>
    </button>

    <script>
      const BODY = document.body;
      const btn = document.getElementById('sb-toggle');

      if (localStorage.getItem('sb-hidden') === '1') {
        BODY.classList.add('sb-hidden');
      }

      const sync = () => {
        localStorage.setItem(
          'sb-hidden',
          BODY.classList.contains('sb-hidden') ? '1' : '0'
        );
      };

      btn?.addEventListener('click', () => {
        BODY.classList.toggle('sb-hidden');
        sync();
      });

      document.addEventListener('keydown', ev => {
        if (
          ev.key.toLowerCase() === 's' &&
          !ev.target.closest('input, textarea, [contenteditable="true"]')
        ) {
          ev.preventDefault();
          btn.click();
        }
      });
    </script>

execute:
  cache: false
  message: false
  warning: false
