function adicionarCurva() {
  const codigoUsuario = editor.getValue();

  let consoleSaida = [];
  const logOriginal = console.log;
  console.log = (...args) => {
    consoleSaida.push(args.map(arg => typeof arg === "object" ? JSON.stringify(arg) : String(arg)).join(" "));
  };

  let resultado;
  try {
    const func = new Function(codigoUsuario + "\nreturn typeof output !== 'undefined' ? output : undefined;");
    resultado = func();
  } catch (e1) {
    try {
      const func = new Function(codigoUsuario);
      resultado = func();
    } catch (e2) {
      console.log = logOriginal;
      alert("Erro ao executar o código:\n" + e2.message);
      return;
    }
  }

  console.log = logOriginal;
  if (!resultado) return;

  const texto = consoleSaida.map(l => "> " + l).join("<br>");
  const layout = resultado.layout || {};
  layout.annotations = layout.annotations || [];

  if (texto.trim()) {
    layout.annotations.push({
      text: `<div style="font-family: monospace; font-size: 14px; max-height: 200px; overflow-y: auto; background:#f9f9f9; padding:5px; border:1px solid #ccc;">${texto}</div>`,
      showarrow: false,
      xref: 'paper',
      yref: 'paper',
      x: 0,
      y: 1,
      align: 'left',
      xanchor: 'left',
      yanchor: 'top'
    });
  }




  let data = [];
  if (resultado.data) {
    data = resultado.data;
  } else if (resultado.trace) {
    data = [resultado.trace];
  } else if (resultado.traces) {
    data = resultado.traces;
  } else if (resultado.x_values && resultado.y_values) {
    data = [{
      x: resultado.x_values,
      y: resultado.y_values,
      type: 'scatter',
      mode: 'lines+markers',
      name: resultado.title || "Curva"
    }];
    if (resultado.x_range) layout.xaxis = { range: resultado.x_range, title: resultado.x_label || "" };
    if (resultado.y_range) layout.yaxis = { range: resultado.y_range, title: resultado.y_label || "" };
    layout.title = resultado.title || "";
  }

  curvas.push(...data);

  Plotly.newPlot("grafico", curvas, layout, config).then(() => {
    if (resultado.frames && resultado.frames.length > 0) {
      Plotly.addFrames("grafico", resultado.frames);
      Plotly.animate("grafico", null, {
        frame: { duration: 80, redraw: true },
        transition: { duration: 0 }
      });
    }
  });
}

// ==============================
// FUNCOES AUXILIARES
// ==============================
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function arred(v) {
  return Math.round(v * 10) / 10;
}

function fatorCenario(nome, t, totalPassos) {
  const progresso = totalPassos > 1 ? t / (totalPassos - 1) : 0;

  if (nome === "equilibrado") {
    return {
      clima: 1.00,
      impactoPlantas: 1.00,
      impactoHerb: 1.00,
      impactoPred: 1.00,
      impactoDecomp: 1.00,
      poluicao: 0.00,
      recuperacao: 0.00
    };
  }

  if (nome === "seca") {
    return {
      clima: 1.00 - 0.35 * progresso * intensidadeClima,
      impactoPlantas: 1.00 - 0.45 * progresso * intensidadeImpacto,
      impactoHerb: 1.00 - 0.22 * progresso * intensidadeImpacto,
      impactoPred: 1.00 - 0.12 * progresso * intensidadeImpacto,
      impactoDecomp: 1.00 - 0.10 * progresso * intensidadeImpacto,
      poluicao: 0.00,
      recuperacao: 0.00
    };
  }

  if (nome === "contaminacao") {
    return {
      clima: 0.98,
      impactoPlantas: 1.00 - 0.18 * progresso * intensidadeImpacto,
      impactoHerb: 1.00 - 0.28 * progresso * intensidadeImpacto,
      impactoPred: 1.00 - 0.34 * progresso * intensidadeImpacto,
      impactoDecomp: 1.00 - 0.40 * progresso * intensidadeImpacto,
      poluicao: 0.55 * progresso * intensidadeImpacto,
      recuperacao: 0.00
    };
  }

  if (nome === "recuperacao") {
    return {
      clima: 1.00 + 0.08 * progresso * intensidadeClima,
      impactoPlantas: 1.00 + 0.28 * progresso,
      impactoHerb: 1.00 + 0.16 * progresso,
      impactoPred: 1.00 + 0.10 * progresso,
      impactoDecomp: 1.00 + 0.24 * progresso,
      poluicao: 0.10 - 0.08 * progresso,
      recuperacao: 0.60 * progresso
    };
  }

  return {
    clima: 1.00,
    impactoPlantas: 1.00,
    impactoHerb: 1.00,
    impactoPred: 1.00,
    impactoDecomp: 1.00,
    poluicao: 0.00,
    recuperacao: 0.00
  };
}

function simularEcossistema(cfg, nomeCenario, nPassos) {
  const tempo = [];
  const plantas = [];
  const herbivoros = [];
  const predadores = [];
  const decompositores = [];
  const detritos = [];
  const estabilidade = [];

  let P = cfg.P0 + fertilidadeExtra;
  let H = cfg.H0;
  let C = cfg.C0;
  let D = cfg.D0 + reforcoMicrobiano;
  let M = 28;

  for (let t = 0; t < nPassos; t++) {
    const f = fatorCenario(nomeCenario, t, nPassos);

    const clima = clamp(f.clima, 0.3, 1.4);
    const poluicao = clamp(f.poluicao, 0, 1.2);
    const rec = clamp(f.recuperacao, 0, 1.0);

    const crescimentoPlantas =
      cfg.prodBase *
      clima *
      f.impactoPlantas *
      P *
      (1 - P / cfg.suportePlantas);

    const consumoPlantas = 0.018 * H * (P / (P + 35));
    const perdaPlantasPoluicao = poluicao * 0.06 * P;

    const crescimentoHerb =
      cfg.herbBase *
      f.impactoHerb *
      H *
      (P / (P + 40)) *
      (1 - H / cfg.suporteHerb);

    const herbivoriaPredacao = 0.012 * C * (H / (H + 18));
    const perdaHerbPoluicao = poluicao * 0.04 * H;

    const crescimentoPred =
      cfg.predBase *
      f.impactoPred *
      C *
      (H / (H + 16)) *
      (1 - C / cfg.suportePred);

    const perdaPredPoluicao = poluicao * 0.05 * C;

    const entradaDetritos =
      0.06 * P +
      0.09 * H +
      0.12 * C +
      perdaPlantasPoluicao * 0.7 +
      perdaHerbPoluicao * 0.7 +
      perdaPredPoluicao * 0.7;

    const acaoDecomp =
      cfg.decompBase *
      f.impactoDecomp *
      D *
      (M / (M + 22)) *
      (1 - D / cfg.suporteDecomp);

    const perdaDecompPoluicao = poluicao * 0.06 * D;
    const retornoNutrientes = 0.032 * D * (M / (M + 25)) + 7 * rec;

    P = P + crescimentoPlantas - consumoPlantas - perdaPlantasPoluicao + retornoNutrientes * 0.35;
    H = H + crescimentoHerb - herbivoriaPredacao - perdaHerbPoluicao;
    C = C + crescimentoPred - 0.020 * C - perdaPredPoluicao;
    D = D + acaoDecomp - 0.018 * D - perdaDecompPoluicao + retornoNutrientes * 0.08;
    M = M + entradaDetritos - 0.12 * D * (M / (M + 18));

    P = clamp(P, 5, 260);
    H = clamp(H, 2, 130);
    C = clamp(C, 1, 60);
    D = clamp(D, 3, 150);
    M = clamp(M, 0, 180);

    const media = (P + H + C + D) / 4;
    const dispersao =
      (Math.abs(P - media) + Math.abs(H - media) + Math.abs(C - media) + Math.abs(D - media)) / 4;
    const indiceEstabilidade = clamp(100 - dispersao, 5, 100);

    tempo.push(t);
    plantas.push(arred(P));
    herbivoros.push(arred(H));
    predadores.push(arred(C));
    decompositores.push(arred(D));
    detritos.push(arred(M));
    estabilidade.push(arred(indiceEstabilidade));
  }

  return {
    tempo,
    plantas,
    herbivoros,
    predadores,
    decompositores,
    detritos,
    estabilidade
  };
}

function corEstabilidade(v) {
  if (v >= 70) return "seagreen";
  if (v >= 45) return "goldenrod";
  return "crimson";
}

function classificaEstado(v) {
  if (v >= 70) return "equilibrio alto";
  if (v >= 45) return "equilibrio intermediario";
  return "desequilibrio ecologico";
}

<script>
function salvarCloneJSPlotly() {
  // Captura o código do usuário e escapa com segurança
  const codigoNovo = editor.getValue()
    .replace(/\\/g, '\\\\')
    .replace(/`/g, '\\`')
    .replace(/\$/g, '\\$');

  // Substitui diretamente o valor da variável codigoPadrao na string
  const novaDefinicao = 'var codigoPadrao = `' + codigoNovo + '`;';
  
  // Extrai o HTML original em partes
  const htmlOriginal = document.documentElement.outerHTML;

  const htmlAtualizado = htmlOriginal.replace(
    /var codigoPadrao = `([\s\S]*?)`;/,
    novaDefinicao
  );

  const blob = new Blob([htmlAtualizado], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "JSPlotly.html";
  a.click();
}

function abrirNoChartStudio() {
  const gd = document.getElementById('grafico');
  if (!gd || !gd.data || gd.data.length === 0) {
    alert("Não há gráfico para enviar. Clique em 'add' primeiro.");
    return;
  }

  const dataStr   = JSON.stringify(gd.data || []);
  const layoutStr = JSON.stringify(gd.layout || {});

  // Tenta GET quando o payload é pequeno (URLs muito grandes podem falhar)
  const urlBase = "https://chart-studio.plotly.com/create/";
  const urlGET  = urlBase
    + "?plotlyData="   + encodeURIComponent(dataStr)
    + "&plotlyLayout=" + encodeURIComponent(layoutStr);

  if ((dataStr.length + layoutStr.length) < 1500) {
    window.open(urlGET, "_blank");
    return;
  }

  // Fallback: POST via form oculto (evita limite de URL)
  const form = document.createElement("form");
  form.method = "POST";
  form.action = urlBase;     // Editor do Chart Studio
  form.target = "_blank";

  const inpData = document.createElement("input");
  inpData.type = "hidden";
  inpData.name = "plotlyData";
  inpData.value = dataStr;

  const inpLayout = document.createElement("input");
  inpLayout.type = "hidden";
  inpLayout.name = "plotlyLayout";
  inpLayout.value = layoutStr;

  form.appendChild(inpData);
  form.appendChild(inpLayout);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}


</script>
