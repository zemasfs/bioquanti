function adicionarCurva() {
  const codigoUsuario = editor.getValue();

  let consoleSaida = [];
  const logOriginal = console.log;
  console.log = (...args) => {
    consoleSaida.push(args.map(arg => typeof arg === "object" ? JSON.stringify(arg) : String(arg)).join(" "));
  };

  let resultado;
  try {
    const func = new Function(codigoUsuario + "\nreturn typeof output !== 'undefined' ? output : undefined;");
    resultado = func();
  } catch (e1) {
    try {
      const func = new Function(codigoUsuario);
      resultado = func();
    } catch (e2) {
      console.log = logOriginal;
      alert("Erro ao executar o código:\n" + e2.message);
      return;
    }
  }

  console.log = logOriginal;
  if (!resultado) return;

  const texto = consoleSaida.map(l => "> " + l).join("<br>");
  const layout = resultado.layout || {};
  layout.annotations = layout.annotations || [];

  if (texto.trim()) {
    layout.annotations.push({
      text: `<div style="font-family: monospace; font-size: 14px; max-height: 200px; overflow-y: auto; background:#f9f9f9; padding:5px; border:1px solid #ccc;">${texto}</div>`,
      showarrow: false,
      xref: 'paper',
      yref: 'paper',
      x: 0,
      y: 1,
      align: 'left',
      xanchor: 'left',
      yanchor: 'top'
    });
  }




  let data = [];
  if (resultado.data) {
    data = resultado.data;
  } else if (resultado.trace) {
    data = [resultado.trace];
  } else if (resultado.traces) {
    data = resultado.traces;
  } else if (resultado.x_values && resultado.y_values) {
    data = [{
      x: resultado.x_values,
      y: resultado.y_values,
      type: 'scatter',
      mode: 'lines+markers',
      name: resultado.title || "Curva"
    }];
    if (resultado.x_range) layout.xaxis = { range: resultado.x_range, title: resultado.x_label || "" };
    if (resultado.y_range) layout.yaxis = { range: resultado.y_range, title: resultado.y_label || "" };
    layout.title = resultado.title || "";
  }

  curvas.push(...data);

  Plotly.newPlot("grafico", curvas, layout, config).then(() => {
    if (resultado.frames && resultado.frames.length > 0) {
      Plotly.addFrames("grafico", resultado.frames);
      Plotly.animate("grafico", null, {
        frame: { duration: 80, redraw: true },
        transition: { duration: 0 }
      });
    }
  });
}

// Definir a equação quadrática padrão
var codigoPadrao = `

function gerarDados(epsilon, r, iTrab) {
  const iMax = epsilon / r;
  const correntes = [], potencia = [], tensao = [], rendimento = [];
  for (let i = 0; i <= iMax; i += iMax / 100) {
    const U = epsilon - r * i;
    correntes.push(i);
    potencia.push(i * U);
    tensao.push(U);
    rendimento.push(100 * (U / epsilon));
  }
  const iOp = Math.min(iTrab, iMax);
  const uOp = Math.max(0, epsilon - r * iOp);
  const pOp = iOp * uOp;
  const etaOp = 100 * (uOp / epsilon);
  return { correntes, potencia, tensao, rendimento, iOp, pOp, uOp, etaOp };
}

const epsilonInicial = 12;
const rInicial = 1.5;
const iTrabInicial = (epsilonInicial / rInicial) / 2;

const d0 = gerarDados(epsilonInicial, rInicial, iTrabInicial);

function criarShapes(d) {
  return [
    { type:"line", xref:"x3", yref:"paper", x0:d.iOp, x1:d.iOp, y0:0.05, y1:0.98,
      line:{ dash:"dash", color:"#adb5bd", width:1.5 } },
    { type:"line", xref:"x", yref:"y", x0:0, x1:d.iOp, y0:d.pOp, y1:d.pOp,
      line:{ dash:"dot", color:"#ff6b6b", width:1.5 } },
    { type:"line", xref:"x2", yref:"y2", x0:0, x1:d.iOp, y0:d.uOp, y1:d.uOp,
      line:{ dash:"dot", color:"#1098ad", width:1.5 } },
    { type:"line", xref:"x3", yref:"y3", x0:0, x1:d.iOp, y0:d.etaOp, y1:d.etaOp,
      line:{ dash:"dot", color:"#37b24d", width:1.5 } }
  ];
}

function criarAnnotations(d) {
  return [
    { x:d.iOp, y:0, xref:"x3", yref:"y3",
      text:"<b>i_op = "+d.iOp.toFixed(2)+" A</b>",
      showarrow:false, yshift:-35, font:{size:13, color:"#495057"} },
    { x:0.07, y:d.pOp, xref:"paper", yref:"y",
      text:"<b>"+d.pOp.toFixed(2)+" W</b>",
      showarrow:false, xanchor:"right", font:{size:12, color:"#fa5252"} },
    { x:0.07, y:d.uOp, xref:"paper", yref:"y2",
      text:"<b>"+d.uOp.toFixed(2)+" V</b>",
      showarrow:false, xanchor:"right", font:{size:12, color:"#22b8cf"} },
    { x:0.07, y:d.etaOp, xref:"paper", yref:"y3",
      text:"<b>"+d.etaOp.toFixed(1)+"%</b>",
      showarrow:false, xanchor:"right", font:{size:12, color:"#40c057"} }
  ];
}

const data = [
  { x:d0.correntes, y:d0.potencia,   mode:"lines",   name:"Potência útil",
    hovertemplate:"%{y:.2f} W", line:{color:"#ff6b6b", width:3}, xaxis:"x",  yaxis:"y"  },
  { x:[d0.iOp], y:[d0.pOp],   mode:"markers", showlegend:false,
    marker:{size:10, color:"#fa5252", symbol:"circle"}, xaxis:"x",  yaxis:"y"  },
  { x:d0.correntes, y:d0.tensao,     mode:"lines",   name:"Tensão terminal",
    hovertemplate:"%{y:.2f} V", line:{color:"#1098ad", width:3}, xaxis:"x2", yaxis:"y2" },
  { x:[d0.iOp], y:[d0.uOp],   mode:"markers", showlegend:false,
    marker:{size:10, color:"#22b8cf", symbol:"circle"}, xaxis:"x2", yaxis:"y2" },
  { x:d0.correntes, y:d0.rendimento, mode:"lines",   name:"Rendimento",
    hovertemplate:"%{y:.1f}%", line:{color:"#37b24d", width:3}, xaxis:"x3", yaxis:"y3" },
  { x:[d0.iOp], y:[d0.etaOp], mode:"markers", showlegend:false,
    marker:{size:10, color:"#40c057", symbol:"circle"}, xaxis:"x3", yaxis:"y3" }
];

// ── Valores possíveis para cada slider ──────────────────────────
const epsilonValores = [];
for (let e = 4; e <= 24; e += 2) epsilonValores.push(e);

const rValores = [];
for (let r = 0.5; r <= 5; r += 0.5) rValores.push(Number(r.toFixed(1)));

const iValores = [];
for (let i = 0; i <= 30; i += 1) iValores.push(i);

// ── Steps todos no-op ────────────────────────────────────────────
// Nenhum step carrega dados; o listener plotly_sliderchange
// sempre usa o estado combinado atual dos três sliders.
const noOp = [{}];

const epsilonSteps = epsilonValores.map(e => ({
  method:"restyle", label:e.toFixed(1)+" V", args: noOp
}));

const rSteps = rValores.map(r => ({
  method:"restyle", label:r.toFixed(1)+" Ω", args: noOp
}));

const iSteps = iValores.map(i => ({
  method:"restyle", label:i.toFixed(1)+" A", args: noOp
}));

// ── Layout ───────────────────────────────────────────────────────
const layout = {
  title: { text:"<b>Comportamento Dinâmico do Gerador Elétrico</b>",
           font:{size:18, color:"#212529"} },
  height:900,
  margin:{ t:80, b:320, l:75, r:40 },
  hovermode:"x unified",
  template:"plotly_white",
  xaxis:  { domain:[0.08,0.98], anchor:"y",  showticklabels:false, matches:"x3" },
  xaxis2: { domain:[0.08,0.98], anchor:"y2", showticklabels:false, matches:"x3" },
  xaxis3: { domain:[0.08,0.98], anchor:"y3",
            title:{text:"<b>Corrente (A)</b>", standoff:30},
            showticklabels:true, automargin:true },
  yaxis:  { domain:[0.72,0.98], anchor:"x",
            title:{text:"<b>Potência (W)</b>",   standoff:40} },
  yaxis2: { domain:[0.40,0.64], anchor:"x2",
            title:{text:"<b>Tensão (V)</b>",     standoff:40} },
  yaxis3: { domain:[0.08,0.32], anchor:"x3",
            title:{text:"<b>Rendimento (%)</b>", standoff:40}, range:[0,105] },
  shapes:      criarShapes(d0),
  annotations: criarAnnotations(d0),
  sliders: [
    { active: epsilonValores.indexOf(epsilonInicial),
      x:0.08, y:-0.12, len:0.90, pad:{t:15,b:15},
      currentvalue:{ prefix:"Força eletromotriz (ε): ", font:{size:14,color:"#495057"} },
      steps: epsilonSteps },
    { active: rValores.indexOf(rInicial),
      x:0.08, y:-0.26, len:0.90, pad:{t:15,b:15},
      currentvalue:{ prefix:"Resistência interna (r): ", font:{size:14,color:"#495057"} },
      steps: rSteps },
    { active: iValores.findIndex(v => Math.abs(v - iTrabInicial) < 0.01),
      x:0.08, y:-0.40, len:0.90, pad:{t:15,b:15},
      currentvalue:{ prefix:"Corrente de operação (i): ", font:{size:14,color:"#495057"} },
      steps: iSteps }
  ]
};

// ── Sincronização pós-render ─────────────────────────────────────
// Estado global dos três sliders
let _eps = epsilonInicial;
let _r   = rInicial;
let _i   = iTrabInicial;

setTimeout(() => {
  const gd = document.getElementById("grafico");
  if (!gd) return;

  gd.on("plotly_sliderchange", function(e) {
    const prefix = e.slider.currentvalue && e.slider.currentvalue.prefix;

    if (prefix === "Força eletromotriz (ε): ")
      _eps = epsilonValores[e.slider.active];
    else if (prefix === "Resistência interna (r): ")
      _r = rValores[e.slider.active];
    else if (prefix === "Corrente de operação (i): ")
      _i = iValores[e.slider.active];

    const d = gerarDados(_eps, _r, _i);

    Plotly.update("grafico",
      {
        x: [d.correntes, [d.iOp], d.correntes, [d.iOp], d.correntes, [d.iOp]],
        y: [d.potencia, [d.pOp], d.tensao, [d.uOp], d.rendimento, [d.etaOp]]
      },
      {
        shapes:      criarShapes(d),
        annotations: criarAnnotations(d)
      }
    );
  });
}, 400);

return { data, layout };

`;

<script>
function salvarCloneJSPlotly() {
  // Captura o código do usuário e escapa com segurança
  const codigoNovo = editor.getValue()
    .replace(/\\/g, '\\\\')
    .replace(/`/g, '\\`')
    .replace(/\$/g, '\\$');

  // Substitui diretamente o valor da variável codigoPadrao na string
  const novaDefinicao = 'var codigoPadrao = `' + codigoNovo + '`;';
  
  // Extrai o HTML original em partes
  const htmlOriginal = document.documentElement.outerHTML;

  const htmlAtualizado = htmlOriginal.replace(
    /var codigoPadrao = `([\s\S]*?)`;/,
    novaDefinicao
  );

  const blob = new Blob([htmlAtualizado], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "JSPlotly.html";
  a.click();
}

function abrirNoChartStudio() {
  const gd = document.getElementById('grafico');
  if (!gd || !gd.data || gd.data.length === 0) {
    alert("Não há gráfico para enviar. Clique em 'add' primeiro.");
    return;
  }

  const dataStr   = JSON.stringify(gd.data || []);
  const layoutStr = JSON.stringify(gd.layout || {});

  // Tenta GET quando o payload é pequeno (URLs muito grandes podem falhar)
  const urlBase = "https://chart-studio.plotly.com/create/";
  const urlGET  = urlBase
    + "?plotlyData="   + encodeURIComponent(dataStr)
    + "&plotlyLayout=" + encodeURIComponent(layoutStr);

  if ((dataStr.length + layoutStr.length) < 1500) {
    window.open(urlGET, "_blank");
    return;
  }

  // Fallback: POST via form oculto (evita limite de URL)
  const form = document.createElement("form");
  form.method = "POST";
  form.action = urlBase;     // Editor do Chart Studio
  form.target = "_blank";

  const inpData = document.createElement("input");
  inpData.type = "hidden";
  inpData.name = "plotlyData";
  inpData.value = dataStr;

  const inpLayout = document.createElement("input");
  inpLayout.type = "hidden";
  inpLayout.name = "plotlyLayout";
  inpLayout.value = layoutStr;

  form.appendChild(inpData);
  form.appendChild(inpLayout);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}


</script>
