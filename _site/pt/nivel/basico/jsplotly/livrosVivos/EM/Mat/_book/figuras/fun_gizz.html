    if (CONFIG.SCROLL_INTO_VIEW) {
      try {
        wrap.scrollIntoView({ block: 'center', behavior: 'smooth' });
      } catch (_) {}
    }

    function setMul(m) {
      widthMul = m;
      widthButtons.forEach(function (b) {
        b.setAttribute('aria-pressed', 'false');
      });
      var active = widthButtons.find(function (b) {
        return Number(b.getAttribute('data-mul')) === m;
      });
      if (active) active.setAttribute('aria-pressed', 'true');
    }

    function setLaser(on) {
      btnLaser.setAttribute('aria-pressed', String(!!on));
    }

    function setAxes(on) {
      axesMode = !!on;
      btnAxes.setAttribute('aria-pressed', String(axesMode));
      if (axesMode) {
        btnErase.setAttribute('aria-pressed', 'false');
        setLaser(false);
        setLine(false);
      }
      if (!axesMode) {
        axesPreview = null;
        octx.clearRect(0, 0, W, H);
      }
    }

    function setLine(on) {
      lineMode = !!on;
      btnLine.setAttribute('aria-pressed', String(lineMode));
      if (lineMode) {
        btnErase.setAttribute('aria-pressed', 'false');
        setLaser(false);
        setAxes(false);
      }
      if (!lineMode) {
        linePreview = null;
        octx.clearRect(0, 0, W, H);
      }
    }

    function laserActive() {
      return (btnLaser.getAttribute('aria-pressed') === 'true') || laserHold;
    }

    var laserFadeRunning = false, fadeTail = 0;

    function startLaserFade() {
      fadeTail = 12;
      if (laserFadeRunning) return;
      laserFadeRunning = true;
      (function tick() {
        octx.globalCompositeOperation = 'destination-out';
        octx.fillStyle = 'rgba(0,0,0,0.06)';
        octx.fillRect(0, 0, W, H);
        octx.globalCompositeOperation = 'source-over';
        if (laserActive()) fadeTail = 12;
        if (laserActive() || --fadeTail > 0) requestAnimationFrame(tick);
        else laserFadeRunning = false;
      })();
    }

    function laserDot(x, y) {
      octx.globalCompositeOperation = 'source-over';
      octx.fillStyle = 'rgba(255,60,60,0.95)';
      octx.beginPath();
      octx.arc(x, y, 6, 0, Math.PI * 2);
      octx.fill();
      startLaserFade();
    }

    function noise() {
      return (Math.random() - 0.5) * 2;
    }

function drawSeg(s, a, b) {
  var pRaw = (typeof b.p === 'number' && b.p > 0) ? b.p : 0.5;

  // CONTROLES DE SENSIBILIDADE
  var MIN = 0.05;   // quase invisivel
  var MAX = 2.2;    // bem fortinho
  var GAMMA = 2.2;  // sensibilidade da curva

  var curved = Math.pow(pRaw, GAMMA);
  var target = s.width * (MIN + (MAX - MIN) * curved);

  // suavizacao para evitar saltos
  var prev = (typeof s.lastW === 'number') ? s.lastW : target;
  var w = prev * 0.65 + target * 0.35;
  s.lastW = w;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = s.color;
  ctx.lineWidth = Math.max(0.3, w);

  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();

  if (CHALK_NOISE) {
    ctx.globalAlpha = 0.16;
    ctx.lineWidth = Math.max(0.3, w * 1.12);

    ctx.beginPath();
    ctx.moveTo(a.x + (Math.random() - 0.5) * 0.5, a.y + (Math.random() - 0.5) * 0.5);
    ctx.lineTo(b.x + (Math.random() - 0.5) * 0.5, b.y + (Math.random() - 0.5) * 0.5);
    ctx.stroke();

    ctx.globalAlpha = 1;
  }
}

    function drawAxesShape(ax, targetCtx) {
      var c = targetCtx || ctx;
      var color = ax.color || currentColor;
      var w = ax.width || (baseWidth * widthMul);
      c.save();
      c.strokeStyle = color;
      c.lineWidth = Math.max(1, w * 0.6);
      c.lineCap = 'round';
      c.lineJoin = 'round';
      c.beginPath();
      c.moveTo(ax.x0, ax.y0);
      c.lineTo(ax.x1, ax.y0);
      c.stroke();
      c.beginPath();
      c.moveTo(ax.x0, ax.y0);
      c.lineTo(ax.x0, ax.y1);
      c.stroke();
      c.restore();
    }

    function drawLineShape(li, targetCtx) {
      var c = targetCtx || ctx;
      var color = li.color || currentColor;
      var w = li.width || (baseWidth * widthMul);
      c.save();
      c.strokeStyle = color;
      c.lineWidth = Math.max(1, w * 0.6);
      c.lineCap = 'round';
      c.lineJoin = 'round';
      c.beginPath();
      c.moveTo(li.x0, li.y0);
      c.lineTo(li.x1, li.y1);
      c.stroke();
      c.restore();
    }

    function drawAxesPreview(ax) {
      octx.clearRect(0, 0, W, H);
      drawAxesShape(ax, octx);
    }

    function drawLinePreview(li) {
      octx.clearRect(0, 0, W, H);
      drawLineShape(li, octx);
    }

    function dust() {
      if (!CHALK_NOISE) return;
      var n = Math.floor((W * H) / 30000);
      ctx.save();
      ctx.globalAlpha = 0.05;
      ctx.fillStyle = BOARD === '#ffffff' ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,1)';
      for (var i = 0; i < n; i++) {
        var r = Math.random() * 1.1;
        ctx.beginPath();
        ctx.arc(Math.random() * W, Math.random() * H, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function redraw() {
      ctx.fillStyle = BOARD;
      ctx.fillRect(0, 0, W, H);

      if (showGrid) {
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = BOARD === '#ffffff' ? 'rgba(0,0,0,.12)' : 'rgba(255,255,255,.25)';
        ctx.lineWidth = 1;
        for (var x = 0; x <= W; x += GRID_STEP) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, H);
          ctx.stroke();
        }
        for (var y = 0; y <= H; y += GRID_STEP) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      for (var k = 0; k < strokes.length; k++) {
        var s = strokes[k];
        if (s.mode === 'axes') {
          drawAxesShape(s, ctx);
          continue;
        }
        if (s.mode === 'line') {
          drawLineShape(s, ctx);
          continue;
        }
        var p = s.points;
        if (!p || p.length < 2) continue;
        for (var i = 1; i < p.length; i++) drawSeg(s, p[i - 1], p[i]);
      }

      octx.clearRect(0, 0, W, H);
      dust();
    }

    function pt(ev) {
      var rc = canvas.getBoundingClientRect();
      return {
        x: ev.clientX - rc.left,
        y: ev.clientY - rc.top,
        p: (typeof ev.pressure === 'number' && ev.pressure > 0) ? ev.pressure : 0.5
      };
    }

    function pad2(n) {
      return String(n).padStart(2, '0');
    }

    function fileStamp() {
      var d = new Date();
      return (
        d.getFullYear() +
        pad2(d.getMonth() + 1) +
        pad2(d.getDate()) +
        '-' +
        pad2(d.getHours()) +
        pad2(d.getMinutes())
      );
    }

    function makeExportHTML(isProject) {
      var exportConfig = {
        BOARD_COLOR: BOARD,
        CHALK_COLORS: colors,
        DEFAULT_CHALK_COLOR: currentColor,
        BASE_WIDTH: baseWidth,
        WIDTH_STEPS: widthSteps,
        WIDTH_LABELS: widthLabels,
        SHOW_GRID: showGrid,
        IS_EXPORTED_HTML: true
      };

      var bootSource = "(" + bootstrapGizz.toString() + ")(window.__GIZZ_BOOT_CONFIG__ || {});";

      var html =
        "<!DOCTYPE html>" +
        "<html lang='pt-br'>" +
        "<head>" +
        "<meta charset='utf-8'>" +
        "<meta name='viewport' content='width=device-width, initial-scale=1'>" +
        "<title>Gizz</title>" +
        "</head>" +
        "<body>" +
        "<script id='gizz-boot-config'>window.__GIZZ_BOOT_CONFIG__=" + JSON.stringify(exportConfig) + "<\/script>" +
        "<script id='gizz-strokes'>window.__INITIAL_STROKES__=" + JSON.stringify(strokes) + "<\/script>" +
        "<script id='gizz-export-kind'>window.__GIZZ_PROJECT_MODE__=" + JSON.stringify(!!isProject) + "<\/script>" +
        "<script>" + bootSource.replace(/<\/script>/gi, "<\\/script>") + "<\/script>" +
        "</body>" +
        "</html>";

      return {
        html: html,
        stamp: fileStamp()
      };
    }

    function savePNG() {
      try {
        var a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'gizz-' + fileStamp() + '.png';
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (err) {
        alert('Falha ao salvar PNG: ' + err.message);
      }
    }

    function saveAsHTML() {
      try {
        var out = makeExportHTML(false);
        var blob = new Blob([out.html], { type: 'text/html' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'gizz-' + out.stamp + '.html';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 1500);
      } catch (err) {
        alert('Falha ao salvar HTML: ' + err.message);
      }
    }

    function saveProjectHTML() {
      try {
        var out = makeExportHTML(true);
        var blob = new Blob([out.html], { type: 'text/html' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'gizz-projeto-' + out.stamp + '.html';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 1500);
      } catch (err) {
        alert('Falha ao salvar projeto: ' + err.message);
      }
    }

    function toggleFull(force) {
      var on = (force !== undefined) ? !!force : !wrap.classList.contains('qg_fs');
      wrap.classList.toggle('qg_fs', on);
      (on ? document.documentElement.classList.add : document.documentElement.classList.remove)('qg_noscroll');
      (on ? document.body.classList.add : document.body.classList.remove)('qg_noscroll');
      btnFULL.style.display = on ? 'none' : 'inline-block';
      btnEXIT.style.display = on ? 'inline-block' : 'none';
      setToolsHeight();
      setTimeout(setSize, 30);
    }

    selTheme.onchange = function () { applyTheme(this.value); };

    setMul(widthSteps[0]);
    widthButtons.forEach(function (btn) {
      btn.onclick = function () { setMul(Number(this.getAttribute('data-mul'))); };
    });

    btnGrid.onclick = function () {
      showGrid = !showGrid;
      this.setAttribute('aria-pressed', String(showGrid));
      redraw();
    };

    btnErase.onclick = function () {
      var v = this.getAttribute('aria-pressed') === 'true';
      this.setAttribute('aria-pressed', String(!v));
      setLaser(false);
      setAxes(false);
      setLine(false);
    };

    btnLaser.onclick = function () {
      setLaser(!(this.getAttribute('aria-pressed') === 'true'));
      if (btnLaser.getAttribute('aria-pressed') === 'true') {
        btnErase.setAttribute('aria-pressed', 'false');
        setAxes(false);
        setLine(false);
      }
    };

    btnAxes.onclick = function () { setAxes(!axesMode); };
    btnLine.onclick = function () { setLine(!lineMode); };

    btnFULL.addEventListener('click', function () { toggleFull(); });
    btnEXIT.addEventListener('click', function () { toggleFull(false); });

    btnEXIT.style.display = 'none';
    btnFULL.style.display = 'inline-block';

    btnPNG.addEventListener('click', savePNG);
    btnUndo.addEventListener('click', function () {
      if (strokes.length) {
        strokes.pop();
        redraw();
      }
    });
    btnClean.addEventListener('click', function () {
      strokes.length = 0;
      redraw();
    });
    btnHTML.addEventListener('click', saveAsHTML);
    btnPROJECT.addEventListener('click', saveProjectHTML);
    btnPROJECT.style.display = CONFIG.IS_EXPORTED_HTML ? 'inline-block' : 'none';

    ['touchstart', 'touchmove', 'touchend', 'gesturestart', 'gesturechange', 'gestureend'].forEach(function (type) {
      board.addEventListener(type, function (e) {
        e.preventDefault();
      }, { passive: false });
    });

    canvas.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });

    function beginDraw(ev) {
      ev.preventDefault();
      canvas.setPointerCapture(ev.pointerId);
      var p = pt(ev);

      if (axesMode) {
        drawing = false;
        axesPreview = {
          mode: 'axes',
          x0: p.x,
          y0: p.y,
          x1: p.x,
          y1: p.y,
          color: currentColor,
          width: baseWidth * widthMul
        };
        drawAxesPreview(axesPreview);
        return;
      }

      if (lineMode) {
        drawing = false;
        linePreview = {
          mode: 'line',
          x0: p.x,
          y0: p.y,
          x1: p.x,
          y1: p.y,
          color: currentColor,
          width: baseWidth * widthMul
        };
        drawLinePreview(linePreview);
        return;
      }

      var rightBtn = (ev.button === 2) || ((typeof ev.buttons === 'number') && ((ev.buttons & 2) === 2));
      var fixedErase = btnErase.getAttribute('aria-pressed') === 'true';
      var erasing = rightBtn || eraseHold || fixedErase;

      if (laserActive()) {
        laserDot(p.x, p.y);
        drawing = false;
        return;
      }

      drawing = true;
      cur = {
        color: (erasing ? BOARD : currentColor),
        width: baseWidth * widthMul,
        mode: erasing ? 'erase' : 'draw',
        points: [p]
      };
      strokes.push(cur);

      ctx.fillStyle = cur.color;
var p0 = (typeof p.p === 'number' && p.p > 0) ? p.p : 0.5;
var MIN0 = 0.05;
var MAX0 = 2.2;
var GAMMA0 = 2.2;
var curved0 = Math.pow(p0, GAMMA0);
var w0 = cur.width * (MIN0 + (MAX0 - MIN0) * curved0);
cur.lastW = w0;
var r = Math.max(0.3, w0) / 2;      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function feedMove(ev) {
      var list = (typeof ev.getCoalescedEvents === 'function') ? ev.getCoalescedEvents() : [ev];

      for (var j = 0; j < list.length; j++) {
        var e = list[j];
        var p = pt(e);

        if (axesMode && axesPreview) {
          axesPreview.x1 = p.x;
          axesPreview.y1 = p.y;
          drawAxesPreview(axesPreview);
          continue;
        }

        if (lineMode && linePreview) {
          linePreview.x1 = p.x;
          linePreview.y1 = p.y;
          drawLinePreview(linePreview);
          continue;
        }

        if (laserActive()) {
          laserDot(p.x, p.y);
          continue;
        }

        if (!drawing) continue;

        ev.preventDefault();
        var a = cur.points[cur.points.length - 1];
        cur.points.push(p);

        var dx = p.x - a.x;
        var dy = p.y - a.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        var steps = Math.max(1, Math.floor(dist / 4));

        for (var i = 1; i <= steps; i++) {
          var t = i / steps;
          drawSeg(cur, a, {
            x: a.x + dx * t,
            y: a.y + dy * t,
            p: p.p
          });
        }
      }
    }

    function endDraw(ev) {
      if (axesMode && axesPreview) {
        ev.preventDefault();
        strokes.push({
          mode: 'axes',
          x0: axesPreview.x0,
          y0: axesPreview.y0,
          x1: axesPreview.x1,
          y1: axesPreview.y1,
          color: axesPreview.color,
          width: axesPreview.width
        });
        axesPreview = null;
        octx.clearRect(0, 0, W, H);
        redraw();
        try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
        return;
      }

      if (lineMode && linePreview) {
        ev.preventDefault();
        strokes.push({
          mode: 'line',
          x0: linePreview.x0,
          y0: linePreview.y0,
          x1: linePreview.x1,
          y1: linePreview.y1,
          color: linePreview.color,
          width: linePreview.width
        });
        linePreview = null;
        octx.clearRect(0, 0, W, H);
        redraw();
        try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
        return;
      }

      if (laserActive()) {
        try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
        return;
      }

      if (!drawing) return;
      ev.preventDefault();
      drawing = false;
      try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
    }

    canvas.addEventListener('pointerdown', beginDraw, { passive: false });
    canvas.addEventListener('pointermove', feedMove, { passive: false });
    canvas.addEventListener('pointerrawupdate', feedMove, { passive: false });
    canvas.addEventListener('pointerup', endDraw, { passive: false });
    canvas.addEventListener('pointercancel', endDraw, { passive: false });

    // CONTROLE DE ATALHO DE TECLADO:
    window.addEventListener('keydown', function (e) {
  if (!e.altKey) return;

  var k = e.key.toLowerCase();

  if (k === 'e') {
    e.preventDefault();
    eraseHold = true;
    setLaser(false);
    setAxes(false);
    setLine(false);
  }

  if (k === 'l') {
    e.preventDefault();
    laserHold = true;
    setAxes(false);
    setLine(false);
  }

  if (k === 'z') {
    e.preventDefault();
    if (strokes.length) {
      strokes.pop();
      redraw();
    }
  }

  if (k === 'x') {
    e.preventDefault();
    strokes.length = 0;
    redraw();
  }

  if (k === 'h') {
    e.preventDefault();
    saveAsHTML();
  }

  if (k === 'f') {
    e.preventDefault();
    toggleFull();
  }
});

// ATLHO DO KEYUP DE LETRAS

window.addEventListener('keyup', function (e) {
  var k = e.key.toLowerCase();
  if (k === 'e') eraseHold = false;
  if (k === 'l') laserHold = false;
});

    setSize();
    applyTheme(BOARD);
  })(window.__GIZZ_BOOT_CONFIG__ || {});</script></body></html>
