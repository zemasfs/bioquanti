  },
  click: function(gd) {
    // O clique no botão ativa o modo de anotação
    const handler = function(eventData) {
      const x = eventData.points[0].x;
      const y = eventData.points[0].y;
      const texto = prompt("Digite o texto a ser inserido:");
      if (texto) {
        Plotly.relayout(gd, {
          annotations: (gd.layout.annotations || []).concat([{
            x: x,
            y: y,
            text: texto,
            showarrow: true,
            arrowhead: 2
          }])
        });
      }
      gd.removeListener('plotly_click', handler);
    };
    gd.on('plotly_click', handler);
  }
}

function adicionarCurva() {
  const codigoUsuario = editor.getValue();

  let consoleSaida = [];
  const logOriginal = console.log;
  console.log = (...args) => {
    consoleSaida.push(args.map(arg => typeof arg === "object" ? JSON.stringify(arg) : String(arg)).join(" "));
  };

  let resultado;
  try {
    const func = new Function(codigoUsuario + "\nreturn typeof output !== 'undefined' ? output : undefined;");
    resultado = func();
  } catch (e1) {
    try {
      const func = new Function(codigoUsuario);
      resultado = func();
    } catch (e2) {
      console.log = logOriginal;
      alert("Erro ao executar o código:\n" + e2.message);
      return;
    }
  }

  console.log = logOriginal;
  if (!resultado) return;

  const texto = consoleSaida.map(l => "> " + l).join("<br>");
  const layout = resultado.layout || {};
  layout.annotations = layout.annotations || [];

  if (texto.trim()) {
    layout.annotations.push({
      text: `<div style="font-family: monospace; font-size: 14px; max-height: 200px; overflow-y: auto; background:#f9f9f9; padding:5px; border:1px solid #ccc;">${texto}</div>`,
      showarrow: false,
      xref: 'paper',
      yref: 'paper',
      x: 0,
      y: 1,
      align: 'left',
      xanchor: 'left',
      yanchor: 'top'
    });
  }




  let data = [];
  if (resultado.data) {
    data = resultado.data;
  } else if (resultado.trace) {
    data = [resultado.trace];
  } else if (resultado.traces) {
    data = resultado.traces;
  } else if (resultado.x_values && resultado.y_values) {
    data = [{
      x: resultado.x_values,
      y: resultado.y_values,
      type: 'scatter',
      mode: 'lines+markers',
      name: resultado.title || "Curva"
    }];
    if (resultado.x_range) layout.xaxis = { range: resultado.x_range, title: resultado.x_label || "" };
    if (resultado.y_range) layout.yaxis = { range: resultado.y_range, title: resultado.y_label || "" };
    layout.title = resultado.title || "";
  }

  curvas.push(...data);

  Plotly.newPlot("grafico", curvas, layout, config).then(() => {
    if (resultado.frames && resultado.frames.length > 0) {
      Plotly.addFrames("grafico", resultado.frames);
      Plotly.animate("grafico", null, {
        frame: { duration: 80, redraw: true },
        transition: { duration: 0 }
      });
    }
  });
}

    elementos: ["O", "O2"],

    propriedade: "Molécula estável, ligação covalente entre ametais."
  },
  "Cu": {
    titulo: "Cu - sólido metálico",
    tipo: "metalica",
    elementos: ["Cu", "Cu"],
    descricao: "Cátions metálicos organizados em rede com elétrons deslocalizados.",
    propriedade: "Alta condutividade elétrica e térmica, brilho metálico, maleabilidade."
  },
  "SiO2": {
    titulo: "SiO2 - rede covalente",
    tipo: "rede",
    elementos: ["Si", "O"],
    descricao: "Rede tridimensional covalente extensa, com grande rigidez estrutural.",
    propriedade: "Material duro, alto ponto de fusão, baixa condução elétrica."
  }
};

const s = sistemas[sistema] || sistemas["NaCl"];
const el1 = elementos[s.elementos[0]];
const el2 = elementos[s.elementos[1]];

// -----------------------------------
// Funções auxiliares
// -----------------------------------
function camadaTexto(arr) {
  const nomes = ["K", "L", "M", "N"];
  let partes = [];
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] > 0) partes.push(nomes[i] + ":" + arr[i]);
  }
  return partes.join(" | ");
}

function diferencaEN(a, b) {
  return Math.abs(a.eletroneg - b.eletroneg).toFixed(2);
}

function corTipo(tipo) {
  if (tipo === "ionica") return "rgb(220,80,80)";
  if (tipo === "covalente") return "rgb(80,140,220)";
  if (tipo === "metalica") return "rgb(220,170,60)";
  if (tipo === "rede") return "rgb(120,120,120)";
  return "rgb(100,100,100)";
}

// -----------------------------------
// Painel 1 - Distribuição eletrônica
// -----------------------------------
const barras = [
  {
    type: "bar",
    name: el1.nome,
    x: ["K", "L", "M", "N"],
    y: el1.camada,
    xaxis: "x1",
    yaxis: "y1"
  },
  {
    type: "bar",
    name: el2.nome,
    x: ["K", "L", "M", "N"],
    y: el2.camada,
    xaxis: "x1",
    yaxis: "y1"
  }
];

// -----------------------------------
// Painel 2 - Modelo energético
// -----------------------------------
let xEnergia = [];
let yEnergia = [];
for (let x = 0.8; x <= 6.0; x += 0.1) {
  xEnergia.push(Number(x.toFixed(2)));

  let y;
  if (s.tipo === "ionica") {
    y = 1.8 / Math.pow(x, 2) - 2.8 / x;
  } else if (s.tipo === "covalente") {
    y = 4 / Math.pow(x, 12) - 4 / Math.pow(x, 6);
  } else if (s.tipo === "metalica") {
    y = 2.2 / Math.pow(x, 10) - 3.2 / Math.pow(x, 5);
  } else {
    y = 5 / Math.pow(x, 12) - 5.5 / Math.pow(x, 6);
  }
  yEnergia.push(y);
}

const curvaEnergia = {
  type: "scatter",
  mode: "lines",
  x: xEnergia,
  y: yEnergia,
  xaxis: "x2",
  yaxis: "y2",
  name: "Energia relativa"
};

// -----------------------------------
// Painel 3 - Representação estrutural
// -----------------------------------
let traceEstrutura = [];
let anotacoes = [];

if (s.tipo === "ionica") {
  const xs = [1,2,3,1,2,3,1,2,3];
  const ys = [3,3,3,2,2,2,1,1,1];
  const txt = ["Na+","Cl-","Na+","Cl-","Na+","Cl-","Na+","Cl-","Na+"];
  const siz = [26,30,26,30,26,30,26,30,26];

  traceEstrutura.push({
    type: "scatter",
    mode: "markers+text",
    x: xs,
    y: ys,
    text: txt,
    textposition: "middle center",
    marker: { size: siz, color: ["#f4a261","#5dade2","#f4a261","#5dade2","#f4a261","#5dade2","#f4a261","#5dade2","#f4a261"] },
    xaxis: "x3",
    yaxis: "y3",
    name: "Rede iônica"
  });

  anotacoes.push({
    x: 2,
    y: 3.5,
    xref: "x3",
    yref: "y3",
    text: "Rede cristalina de íons",
    showarrow: false,
    font: { size: 12 }
  });

} else if (s.tipo === "covalente") {
  traceEstrutura.push({
    type: "scatter",
    mode: "markers+text",
    x: [1.5, 3.5],
    y: [2, 2],
    text: [s.elementos[0], s.elementos[1] === "O2" ? "O" : s.elementos[1]],
    textposition: "middle center",
    marker: { size: [34, 42], color: ["#9bd0f5", "#f7a8a8"] },
    xaxis: "x3",
    yaxis: "y3",
    name: "Átomos"
  });

  traceEstrutura.push({
    type: "scatter",
    mode: "lines",
    x: [2.0, 3.0],
    y: [2, 2],
    line: { width: 6, color: "#666" },
    xaxis: "x3",
    yaxis: "y3",
    name: "Ligação"
  });

  anotacoes.push({
    x: 2.5,
    y: 2.35,
    xref: "x3",
    yref: "y3",
    text: "Compartilhamento de elétrons",
    showarrow: false,
    font: { size: 12 }
  });

} else if (s.tipo === "metalica") {
  const xs = [1,2,3,1.5,2.5,3.5];
  const ys = [2.6,2.6,2.6,1.4,1.4,1.4];

  traceEstrutura.push({
    type: "scatter",
    mode: "markers+text",
    x: xs,
    y: ys,
    text: ["Cu+","Cu+","Cu+","Cu+","Cu+","Cu+"],
    textposition: "middle center",
    marker: { size: 28, color: "#d8b04c" },
    xaxis: "x3",
    yaxis: "y3",
    name: "Cátions metálicos"
  });

  traceEstrutura.push({
    type: "scatter",
    mode: "markers",
    x: [1.2,1.8,2.4,3.0,3.4,1.6,2.2,2.8,3.2],
    y: [2.0,2.1,2.0,2.1,2.0,1.9,1.8,1.9,1.8],
    marker: { size: 10, color: "#6ec5ff" },
    xaxis: "x3",
    yaxis: "y3",
    name: "Elétrons deslocalizados"
  });

  anotacoes.push({
    x: 2.3,
    y: 3.1,
    xref: "x3",
    yref: "y3",
    text: "Mar de elétrons",
    showarrow: false,
    font: { size: 12 }
  });

} else if (s.tipo === "rede") {
  traceEstrutura.push({
    type: "scatter",
    mode: "markers+lines+text",
    x: [1,2,3,2,1,3],
    y: [2,3,2,1,1,1],
    text: ["O","Si","O","Si","O","O"],
    textposition: "middle center",
    marker: { size: [24,34,24,34,24,24], color: ["#f7a8a8","#b0b0b0","#f7a8a8","#b0b0b0","#f7a8a8","#f7a8a8"] },
    line: { width: 3, color: "#777" },
    xaxis: "x3",
    yaxis: "y3",
    name: "Rede covalente"
  });

  anotacoes.push({
    x: 2,
    y: 3.5,
    xref: "x3",
    yref: "y3",
    text: "Rede extensa e rígida",
    showarrow: false,
    font: { size: 12 }
  });
}

// -----------------------------------
// Painel 4 - Radar de propriedades
// -----------------------------------
let props = [];
if (s.tipo === "ionica") {
  props = [9, 2, 8, 7, 3];
} else if (s.tipo === "covalente") {
  props = [5, 4, 3, 2, 6];
} else if (s.tipo === "metalica") {
  props = [8, 9, 3, 5, 9];
} else {
  props = [10, 1, 9, 10, 2];
}

const radar = {
  type: "scatterpolar",
  r: props.concat([props[0]]),
  theta: ["Rigidez", "Condutividade", "Solubilidade em água", "Ponto de fusão", "Maleabilidade", "Rigidez"],
  fill: "toself",
  name: "Propriedades",
  subplot: "polar"
};

// -----------------------------------
// Texto explicativo
// -----------------------------------
const textoSistema =
  "<b>" + s.titulo + "</b><br>" +
  s.descricao + "<br><br>" +
  "<b>Elemento 1:</b> " + el1.nome + " (Z=" + el1.Z + ")<br>" +
  "<b>Distribuição:</b> " + camadaTexto(el1.camada) + "<br><br>" +
  "<b>Elemento 2:</b> " + el2.nome + " (Z=" + el2.Z + ")<br>" +
  "<b>Distribuição:</b> " + camadaTexto(el2.camada) + "<br><br>" +
  "<b>Diferença de eletronegatividade:</b> " + diferencaEN(el1, el2) + "<br>" +
  "<b>Ligação predominante:</b> " + s.tipo + "<br>" +
  "<b>Propriedade emergente:</b> " + s.propriedade;

// -----------------------------------
// Retorno final
// -----------------------------------
return {
  data: [
    ...barras,
    curvaEnergia,
    ...traceEstrutura,
    radar
  ],
  layout: {
    title: "Estrutura da matéria, ligações e propriedades",
    showlegend: true,

    grid: { rows: 2, columns: 2, pattern: "independent" },

    xaxis:  { domain: [0.00, 0.43], anchor: "y1", title: "Camadas eletrônicas" },
    yaxis:  { domain: [0.56, 1.00], anchor: "x1", title: "Número de elétrons" },

    xaxis2: { domain: [0.57, 1.00], anchor: "y2", title: "Distância interatômica (modelo)" },
    yaxis2: { domain: [0.56, 1.00], anchor: "x2", title: "Energia relativa" },

    xaxis3: { domain: [0.00, 0.43], anchor: "y3", visible: false, range: [0.5, 4.2] },
    yaxis3: { domain: [0.00, 0.42], anchor: "x3", visible: false, range: [0.5, 3.8] },

    polar: {
      domain: { x: [0.57, 1.00], y: [0.00, 0.42] },
      radialaxis: { visible: true, range: [0, 10] }
    },

    annotations: [
      ...anotacoes,
      {
        x: 0.5,
        y: -0.10,
        xref: "paper",
        yref: "paper",
        text: textoSistema,
        showarrow: false,
        align: "left",
        font: { size: 12 },
        bordercolor: corTipo(s.tipo),
        borderwidth: 1,
        borderpad: 8,
        bgcolor: "rgba(255,255,255,0.92)"
      }
    ],

    margin: { l: 40, r: 40, t: 60, b: 130 }
  }
};

`;


window.onload = function() {
    editor.setValue(codigoPadrao, -1);
    resetarGrafico();
};

<script>
function salvarCloneJSPlotly() {
  // Captura o código do usuário e escapa com segurança
  const codigoNovo = editor.getValue()
    .replace(/\\/g, '\\\\')
    .replace(/`/g, '\\`')
    .replace(/\$/g, '\\$');

  // Substitui diretamente o valor da variável codigoPadrao na string
  const novaDefinicao = 'var codigoPadrao = `' + codigoNovo + '`;';
  
  // Extrai o HTML original em partes
  const htmlOriginal = document.documentElement.outerHTML;

  const htmlAtualizado = htmlOriginal.replace(
    /var codigoPadrao = `([\s\S]*?)`;/,
    novaDefinicao
  );

  const blob = new Blob([htmlAtualizado], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "JSPlotly.html";
  a.click();
}

function abrirNoChartStudio() {
  const gd = document.getElementById('grafico');
  if (!gd || !gd.data || gd.data.length === 0) {
    alert("Não há gráfico para enviar. Clique em 'add' primeiro.");
    return;
  }

  const dataStr   = JSON.stringify(gd.data || []);
  const layoutStr = JSON.stringify(gd.layout || {});

  // Tenta GET quando o payload é pequeno (URLs muito grandes podem falhar)
  const urlBase = "https://chart-studio.plotly.com/create/";
  const urlGET  = urlBase
    + "?plotlyData="   + encodeURIComponent(dataStr)
    + "&plotlyLayout=" + encodeURIComponent(layoutStr);

  if ((dataStr.length + layoutStr.length) < 1500) {
    window.open(urlGET, "_blank");
    return;
  }

  // Fallback: POST via form oculto (evita limite de URL)
  const form = document.createElement("form");
  form.method = "POST";
  form.action = urlBase;     // Editor do Chart Studio
  form.target = "_blank";

  const inpData = document.createElement("input");
  inpData.type = "hidden";
  inpData.name = "plotlyData";
  inpData.value = dataStr;

  const inpLayout = document.createElement("input");
  inpLayout.type = "hidden";
  inpLayout.name = "plotlyLayout";
  inpLayout.value = layoutStr;

  form.appendChild(inpData);
  form.appendChild(inpLayout);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}


</script>
