function adicionarCurva() {
  const codigoUsuario = editor.getValue();

  let consoleSaida = [];
  const logOriginal = console.log;
  console.log = (...args) => {
    consoleSaida.push(args.map(arg => typeof arg === "object" ? JSON.stringify(arg) : String(arg)).join(" "));
  };

  let resultado;
  try {
    const func = new Function(codigoUsuario + "\nreturn typeof output !== 'undefined' ? output : undefined;");
    resultado = func();
  } catch (e1) {
    try {
      const func = new Function(codigoUsuario);
      resultado = func();
    } catch (e2) {
      console.log = logOriginal;
      alert("Erro ao executar o código:\n" + e2.message);
      return;
    }
  }

  console.log = logOriginal;
  if (!resultado) return;

  const texto = consoleSaida.map(l => "> " + l).join("<br>");
  const layout = resultado.layout || {};
  layout.annotations = layout.annotations || [];

  if (texto.trim()) {
    layout.annotations.push({
      text: `<div style="font-family: monospace; font-size: 14px; max-height: 200px; overflow-y: auto; background:#f9f9f9; padding:5px; border:1px solid #ccc;">${texto}</div>`,
      showarrow: false,
      xref: 'paper',
      yref: 'paper',
      x: 0,
      y: 1,
      align: 'left',
      xanchor: 'left',
      yanchor: 'top'
    });
  }




  let data = [];
  if (resultado.data) {
    data = resultado.data;
  } else if (resultado.trace) {
    data = [resultado.trace];
  } else if (resultado.traces) {
    data = resultado.traces;
  } else if (resultado.x_values && resultado.y_values) {
    data = [{
      x: resultado.x_values,
      y: resultado.y_values,
      type: 'scatter',
      mode: 'lines+markers',
      name: resultado.title || "Curva"
    }];
    if (resultado.x_range) layout.xaxis = { range: resultado.x_range, title: resultado.x_label || "" };
    if (resultado.y_range) layout.yaxis = { range: resultado.y_range, title: resultado.y_label || "" };
    layout.title = resultado.title || "";
  }

  curvas.push(...data);

  Plotly.newPlot("grafico", curvas, layout, config).then(() => {
    if (resultado.frames && resultado.frames.length > 0) {
      Plotly.addFrames("grafico", resultado.frames);
      Plotly.animate("grafico", null, {
        frame: { duration: 80, redraw: true },
        transition: { duration: 0 }
      });
    }
  });
}

// Definir a equação quadrática padrão
var codigoPadrao = `

// =====================================================
// GEOMETRIA INTEGRADA - VERSAO CORRIGIDA COM LAYOUT AMPLO
// Plana + Analitica + Espacial
// JSPlotly / Plotly
// =====================================================

// -----------------------------------------------------
// 1. BASES GEOMETRICAS
// -----------------------------------------------------
const bases = {
  quadrado: {
    nome: "Quadrado",
    pontos: [[-1, -1], [1, -1], [1, 1], [-1, 1]],
    solido: "Prisma de base quadrada / cubo"
  },
  retangulo: {
    nome: "Retangulo",
    pontos: [[-1.6, -1], [1.6, -1], [1.6, 1], [-1.6, 1]],
    solido: "Paralelepipedo"
  },
  triangulo: {
    nome: "Triangulo",
    pontos: [[-1.6, -1], [1.6, -1], [0, 1.6]],
    solido: "Prisma triangular"
  }
};

// -----------------------------------------------------
// 2. FUNCOES AUXILIARES
// -----------------------------------------------------
function rotacionarPonto(x, y, angGraus) {
  const ang = angGraus * Math.PI / 180;
  return [
    x * Math.cos(ang) - y * Math.sin(ang),
    x * Math.sin(ang) + y * Math.cos(ang)
  ];
}

function transformarPontos(pontos, ang, dx, dy) {
  const saida = [];
  for (let i = 0; i < pontos.length; i++) {
    const r = rotacionarPonto(pontos[i][0], pontos[i][1], ang);
    saida.push([r[0] + dx, r[1] + dy]);
  }
  return saida;
}

function fecharPoligono(pontos) {
  const x = [];
  const y = [];
  for (let i = 0; i < pontos.length; i++) {
    x.push(pontos[i][0]);
    y.push(pontos[i][1]);
  }
  x.push(pontos[0][0]);
  y.push(pontos[0][1]);
  return { x, y };
}

function centroideSimples(pontos) {
  let sx = 0;
  let sy = 0;
  for (let i = 0; i < pontos.length; i++) {
    sx += pontos[i][0];
    sy += pontos[i][1];
  }
  return [sx / pontos.length, sy / pontos.length];
}

function areaPoligono(pontos) {
  let soma = 0;
  for (let i = 0; i < pontos.length; i++) {
    const j = (i + 1) % pontos.length;
    soma += pontos[i][0] * pontos[j][1] - pontos[j][0] * pontos[i][1];
  }
  return Math.abs(soma) / 2;
}

function distancia(p1, p2) {
  const dx = p2[0] - p1[0];
  const dy = p2[1] - p1[1];
  return Math.sqrt(dx * dx + dy * dy);
}

function textoVertices(pontos) {
  let s = "";
  for (let i = 0; i < pontos.length; i++) {
    s += "V" + (i + 1) + "=(" +
      pontos[i][0].toFixed(2) + "," +
      pontos[i][1].toFixed(2) + ")";
    if (i < pontos.length - 1) s += " | ";
  }
  return s;
}

function obterDiagonal(pontos) {
  if (pontos.length >= 4) {
    return {
      x: [pontos[0][0], pontos[2][0]],
      y: [pontos[0][1], pontos[2][1]],
      valor: distancia(pontos[0], pontos[2]),
      nome: "Diagonal principal"
    };
  }

  if (pontos.length === 3) {
    return {
      x: [pontos[0][0], pontos[1][0]],
      y: [pontos[0][1], pontos[1][1]],
      valor: distancia(pontos[0], pontos[1]),
      nome: "Lado de referencia"
    };
  }

  return {
    x: [0, 0],
    y: [0, 0],
    valor: 0,
    nome: "Segmento"
  };
}

function montarObjeto(chaveBase, ang, dx, dy, h) {
  const base = bases[chaveBase];
  const pontos = transformarPontos(base.pontos, ang, dx, dy);
  const fechado = fecharPoligono(pontos);
  const centro = centroideSimples(pontos);
  const area = areaPoligono(pontos);
  const diagonal = obterDiagonal(pontos);
  const volume = area * h;

  return {
    forma: base.nome,
    solido: base.solido,
    pontos: pontos,
    x: fechado.x,
    y: fechado.y,
    centroX: centro[0],
    centroY: centro[1],
    area: area,
    volume: volume,
    verticesTexto: textoVertices(pontos),
    diagonalX: diagonal.x,
    diagonalY: diagonal.y,
    diagonalValor: diagonal.valor,
    diagonalNome: diagonal.nome,
    ang: ang,
    dx: dx,
    dy: dy,
    h: h
  };
}

function anotacoes(obj) {
  return [
    {
      x: 0.42,
      y: 1.08,
      xref: "paper",
      yref: "paper",
      text: "Figura plana no plano cartesiano → extrusao espacial | altura = " + obj.h,
      showarrow: false,
      font: { size: 14 }
    },
    {
      x: 0.42,
      y: -0.22,
      xref: "paper",
      yref: "paper",
      align: "center",
      text:
        "<b>Forma:</b> " + obj.forma +
        " | <b>Solido:</b> " + obj.solido +
        "<br><b>Area da base:</b> " + obj.area.toFixed(2) +
        " | <b>Volume:</b> " + obj.volume.toFixed(2) +
        " | <b>Rotacao:</b> " + obj.ang + " graus" +
        " | <b>Translacao:</b> (" + obj.dx.toFixed(1) + ", " + obj.dy.toFixed(1) + ")" +
        "<br><b>" + obj.diagonalNome + ":</b> " + obj.diagonalValor.toFixed(2) +
        "<br><b>Vertices:</b> " + obj.verticesTexto,
      showarrow: false,
      font: { size: 12 }
    }
  ];
}

// -----------------------------------------------------
// 3. CENARIOS DIDATICOS
// -----------------------------------------------------
const cenarios = [
  { id: "c0", label: "Quadrado central", base: "quadrado", ang: 0, dx: 0, dy: 0 },
  { id: "c1", label: "Quadrado girado", base: "quadrado", ang: 45, dx: 0, dy: 0 },
  { id: "c2", label: "Retangulo central", base: "retangulo", ang: 0, dx: 0, dy: 0 },
  { id: "c3", label: "Retangulo deslocado", base: "retangulo", ang: 0, dx: 1.2, dy: 1.0 },
  { id: "c4", label: "Triangulo central", base: "triangulo", ang: 0, dx: 0, dy: 0 },
  { id: "c5", label: "Triangulo girado e deslocado", base: "triangulo", ang: 30, dx: -1.0, dy: 1.0 }
];

const alturas = [0, 1, 2, 3, 4, 5, 6, 7, 8];

const cenarioInicial = cenarios[0];
const alturaInicial = 3;

const inicial = montarObjeto(
  cenarioInicial.base,
  cenarioInicial.ang,
  cenarioInicial.dx,
  cenarioInicial.dy,
  alturaInicial
);

// -----------------------------------------------------
// 4. TRACOS
// -----------------------------------------------------
const traceBase = {
  x: inicial.x,
  y: inicial.y,
  type: "scatter",
  mode: "lines+markers",
  name: "Base",
  hovertemplate: "(%{x:.2f}, %{y:.2f})<extra></extra>",
  line: { width: 3 }
};

const traceCentro = {
  x: [inicial.centroX],
  y: [inicial.centroY],
  type: "scatter",
  mode: "markers+text",
  text: ["Centro"],
  textposition: "top right",
  name: "Centro",
  hovertemplate: "Centro: (%{x:.2f}, %{y:.2f})<extra></extra>",
  marker: { size: 10 },
  visible: true
};

const traceDiagonal = {
  x: inicial.diagonalX,
  y: inicial.diagonalY,
  type: "scatter",
  mode: "lines",
  name: inicial.diagonalNome,
  hovertemplate: inicial.diagonalNome + ": " + inicial.diagonalValor.toFixed(2) + "<extra></extra>",
  line: { dash: "dash", width: 2 },
  visible: true
};

// -----------------------------------------------------
// 5. FRAMES
// -----------------------------------------------------
const frames = [];

for (let i = 0; i < cenarios.length; i++) {
  for (let j = 0; j < alturas.length; j++) {
    const c = cenarios[i];
    const H = alturas[j];

    const obj = montarObjeto(c.base, c.ang, c.dx, c.dy, H);

    frames.push({
      name: c.id + "_h" + H,
      data: [
        {
          x: obj.x,
          y: obj.y
        },
        {
          x: [obj.centroX],
          y: [obj.centroY],
          text: ["Centro"]
        },
        {
          x: obj.diagonalX,
          y: obj.diagonalY,
          hovertemplate: obj.diagonalNome + ": " + obj.diagonalValor.toFixed(2) + "<extra></extra>",
          name: obj.diagonalNome
        }
      ],
      layout: {
        annotations: anotacoes(obj)
      }
    });
  }
}

// -----------------------------------------------------
// 6. BOTOES DE CENARIO
// -----------------------------------------------------
const botoesCenarios = [];

for (let i = 0; i < cenarios.length; i++) {
  const c = cenarios[i];

  botoesCenarios.push({
    label: c.label,
    method: "animate",
    args: [
      [c.id + "_h" + alturaInicial],
      {
        mode: "immediate",
        transition: { duration: 0 },
        frame: { duration: 0, redraw: true }
      }
    ]
  });
}

// -----------------------------------------------------
// 7. SLIDER DE ALTURA
// -----------------------------------------------------
const passosAltura = [];

for (let j = 0; j < alturas.length; j++) {
  const H = alturas[j];

  passosAltura.push({
    label: String(H),
    method: "animate",
    args: [
      [cenarioInicial.id + "_h" + H],
      {
        mode: "immediate",
        transition: { duration: 0 },
        frame: { duration: 0, redraw: true }
      }
    ]
  });
}

// -----------------------------------------------------
// 8. SCRIPT FINAL
// -----------------------------------------------------
return {
  data: [traceBase, traceCentro, traceDiagonal],

  layout: {
    title: {
      text: "Geometria integrada: plana, analitica e espacial",
      x: 0.5,
      y: 0.96
    },

    width: 950,
    height: 720,

    margin: {
      l: 70,
      r: 210,
      t: 120,
      b: 165
    },

    xaxis: {
      title: "Eixo x",
      range: [-4.5, 4.5],
      zeroline: true,
      domain: [0.05, 0.78]
    },

    yaxis: {
      title: "Eixo y",
      range: [-4.5, 4.5],
      zeroline: true,
      scaleanchor: "x",
      scaleratio: 1
    },

    legend: {
      x: 1.02,
      y: 0.95,
      xanchor: "left",
      yanchor: "top"
    },

    annotations: anotacoes(inicial),

    updatemenus: [
      {
        type: "dropdown",
        direction: "down",
        x: 0.02,
        y: 1.14,
        xanchor: "left",
        yanchor: "top",
        buttons: botoesCenarios
      },
      {
        type: "buttons",
        direction: "right",
        x: 0.30,
        y: 1.14,
        xanchor: "left",
        yanchor: "top",
        buttons: [
          {
            label: "Centro ON",
            method: "restyle",
            args: [{ visible: true }, [1]]
          },
          {
            label: "Centro OFF",
            method: "restyle",
            args: [{ visible: false }, [1]]
          },
          {
            label: "Diagonal ON",
            method: "restyle",
            args: [{ visible: true }, [2]]
          },
          {
            label: "Diagonal OFF",
            method: "restyle",
            args: [{ visible: false }, [2]]
          }
        ]
      }
    ],

    sliders: [
      {
        active: 3,
        x: 0.12,
        y: -0.08,
        len: 0.68,
        currentvalue: {
          prefix: "Altura da extrusao: "
        },
        steps: passosAltura
      }
    ]
  },

  frames: frames
};

`;

<script>
function salvarCloneJSPlotly() {
  // Captura o código do usuário e escapa com segurança
  const codigoNovo = editor.getValue()
    .replace(/\\/g, '\\\\')
    .replace(/`/g, '\\`')
    .replace(/\$/g, '\\$');

  // Substitui diretamente o valor da variável codigoPadrao na string
  const novaDefinicao = 'var codigoPadrao = `' + codigoNovo + '`;';
  
  // Extrai o HTML original em partes
  const htmlOriginal = document.documentElement.outerHTML;

  const htmlAtualizado = htmlOriginal.replace(
    /var codigoPadrao = `([\s\S]*?)`;/,
    novaDefinicao
  );

  const blob = new Blob([htmlAtualizado], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "JSPlotly.html";
  a.click();
}

function abrirNoChartStudio() {
  const gd = document.getElementById('grafico');
  if (!gd || !gd.data || gd.data.length === 0) {
    alert("Não há gráfico para enviar. Clique em 'add' primeiro.");
    return;
  }

  const dataStr   = JSON.stringify(gd.data || []);
  const layoutStr = JSON.stringify(gd.layout || {});

  // Tenta GET quando o payload é pequeno (URLs muito grandes podem falhar)
  const urlBase = "https://chart-studio.plotly.com/create/";
  const urlGET  = urlBase
    + "?plotlyData="   + encodeURIComponent(dataStr)
    + "&plotlyLayout=" + encodeURIComponent(layoutStr);

  if ((dataStr.length + layoutStr.length) < 1500) {
    window.open(urlGET, "_blank");
    return;
  }

  // Fallback: POST via form oculto (evita limite de URL)
  const form = document.createElement("form");
  form.method = "POST";
  form.action = urlBase;     // Editor do Chart Studio
  form.target = "_blank";

  const inpData = document.createElement("input");
  inpData.type = "hidden";
  inpData.name = "plotlyData";
  inpData.value = dataStr;

  const inpLayout = document.createElement("input");
  inpLayout.type = "hidden";
  inpLayout.name = "plotlyLayout";
  inpLayout.value = layoutStr;

  form.appendChild(inpData);
  form.appendChild(inpLayout);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}


</script>
