function adicionarCurva() {
  const codigoUsuario = editor.getValue();

  let consoleSaida = [];
  const logOriginal = console.log;
  console.log = (...args) => {
    consoleSaida.push(args.map(arg => typeof arg === "object" ? JSON.stringify(arg) : String(arg)).join(" "));
  };

  let resultado;
  try {
    const func = new Function(codigoUsuario + "\nreturn typeof output !== 'undefined' ? output : undefined;");
    resultado = func();
  } catch (e1) {
    try {
      const func = new Function(codigoUsuario);
      resultado = func();
    } catch (e2) {
      console.log = logOriginal;
      alert("Erro ao executar o código:\n" + e2.message);
      return;
    }
  }

  console.log = logOriginal;
  if (!resultado) return;

  const texto = consoleSaida.map(l => "> " + l).join("<br>");
  const layout = resultado.layout || {};
  layout.annotations = layout.annotations || [];

  if (texto.trim()) {
    layout.annotations.push({
      text: `<div style="font-family: monospace; font-size: 14px; max-height: 200px; overflow-y: auto; background:#f9f9f9; padding:5px; border:1px solid #ccc;">${texto}</div>`,
      showarrow: false,
      xref: 'paper',
      yref: 'paper',
      x: 0,
      y: 1,
      align: 'left',
      xanchor: 'left',
      yanchor: 'top'
    });
  }




  let data = [];
  if (resultado.data) {
    data = resultado.data;
  } else if (resultado.trace) {
    data = [resultado.trace];
  } else if (resultado.traces) {
    data = resultado.traces;
  } else if (resultado.x_values && resultado.y_values) {
    data = [{
      x: resultado.x_values,
      y: resultado.y_values,
      type: 'scatter',
      mode: 'lines+markers',
      name: resultado.title || "Curva"
    }];
    if (resultado.x_range) layout.xaxis = { range: resultado.x_range, title: resultado.x_label || "" };
    if (resultado.y_range) layout.yaxis = { range: resultado.y_range, title: resultado.y_label || "" };
    layout.title = resultado.title || "";
  }

  curvas.push(...data);

  Plotly.newPlot("grafico", curvas, layout, config).then(() => {
    if (resultado.frames && resultado.frames.length > 0) {
      Plotly.addFrames("grafico", resultado.frames);
      Plotly.animate("grafico", null, {
        frame: { duration: 80, redraw: true },
        transition: { duration: 0 }
      });
    }
  });
}

// Definir a equação quadrática padrão
var codigoPadrao = `

// =====================================================
// CALCULO DIFERENCIAL E INTEGRAL - SCRIPT 4 ABSURDO++
// Funcao, derivada, integral acumulada e particula movel
// Compatível com JSPlotly: usar return { data, layout, frames, config }
// =====================================================

// =====================
// AREA DE EDICAO RAPIDA
// =====================

// Opcoes: "sin", "cos", "poly", "exp", "log", "gauss"
const tipoFuncao = typeof input_tipoFuncao !== "undefined" ? input_tipoFuncao : "gauss";

// Normalizar curvas para comparacao visual?
// true ajuda muito em exp/log; false mostra escalas reais.
const normalizar = typeof input_normalizar !== "undefined" ? input_normalizar : false;

// Numero de pontos
const N = typeof input_N !== "undefined" ? input_N : 260;

// Ponto inicial da integral acumulada
const constanteIntegral = typeof input_C !== "undefined" ? input_C : 0;

// Velocidade da animacao conceitual
const passoFrame = typeof input_passoFrame !== "undefined" ? input_passoFrame : 6;

// =====================
// DEFINICAO DO DOMINIO
// =====================

let xmin = -6;
let xmax = 6;

if (tipoFuncao === "exp") {
  xmin = -2.5;
  xmax = 2.5;
}

if (tipoFuncao === "log") {
  xmin = 0.2;
  xmax = 8;
}

if (tipoFuncao === "gauss") {
  xmin = -4;
  xmax = 4;
}

const dx = (xmax - xmin) / (N - 1);

// =====================
// FUNCOES
// =====================

function f(x) {
  if (tipoFuncao === "sin") return Math.sin(x);
  if (tipoFuncao === "cos") return Math.cos(x);
  if (tipoFuncao === "poly") return 0.12 * x * x * x - 0.5 * x;
  if (tipoFuncao === "exp") return Math.exp(x);
  if (tipoFuncao === "log") return Math.log(x);
  if (tipoFuncao === "gauss") return Math.exp(-x * x / 2);
  return Math.sin(x);
}

function nomeFuncao() {
  if (tipoFuncao === "sin") return "f(x) = sen(x)";
  if (tipoFuncao === "cos") return "f(x) = cos(x)";
  if (tipoFuncao === "poly") return "f(x) = 0.12x^3 - 0.5x";
  if (tipoFuncao === "exp") return "f(x) = exp(x)";
  if (tipoFuncao === "log") return "f(x) = ln(x)";
  if (tipoFuncao === "gauss") return "f(x) = exp(-x^2/2)";
  return "f(x)";
}

function derivadaNumerica(x) {
  const h = dx;
  const x1 = Math.max(xmin, x - h);
  const x2 = Math.min(xmax, x + h);
  return (f(x2) - f(x1)) / (x2 - x1);
}

function normaliza(vetor) {
  let maxAbs = 0;
  for (let i = 0; i < vetor.length; i++) {
    if (Number.isFinite(vetor[i])) {
      maxAbs = Math.max(maxAbs, Math.abs(vetor[i]));
    }
  }
  if (maxAbs === 0) return vetor.slice();
  return vetor.map(v => v / maxAbs);
}

// =====================
// CALCULOS
// =====================

let x = [];
let y = [];
let dy = [];
let area = [];

let soma = constanteIntegral;

for (let i = 0; i < N; i++) {
  const xi = xmin + i * dx;
  const yi = f(xi);
  const di = derivadaNumerica(xi);

  if (i > 0) {
    const yAnterior = f(xi - dx);
    soma += ((yAnterior + yi) / 2) * dx;
  }

  x.push(xi);
  y.push(yi);
  dy.push(di);
  area.push(soma);
}

let yPlot = normalizar ? normaliza(y) : y;
let dyPlot = normalizar ? normaliza(dy) : dy;
let areaPlot = normalizar ? normaliza(area) : area;

// =====================
// AREA PREENCHIDA ATE UM PONTO
// =====================

function areaAte(indice) {
  let xa = [];
  let ya = [];

  xa.push(x[0]);
  ya.push(0);

  for (let i = 0; i <= indice; i++) {
    xa.push(x[i]);
    ya.push(yPlot[i]);
  }

  xa.push(x[indice]);
  ya.push(0);

  return { xa, ya };
}

// =====================
// FRAMES DA ANIMACAO
// =====================

let frames = [];

for (let k = 5; k < N; k += passoFrame) {
  const regiao = areaAte(k);

  frames.push({
    name: String(k),
    data: [
      { x: x, y: yPlot },
      { x: x, y: dyPlot },
      { x: x, y: areaPlot },
      { x: regiao.xa, y: regiao.ya },
      { x: [x[k]], y: [yPlot[k]] },
      { x: [x[k]], y: [dyPlot[k]] },
      { x: [x[k]], y: [areaPlot[k]] }
    ]
  });
}

// =====================
// DADOS INICIAIS
// =====================

const k0 = Math.floor(N * 0.25);
const regiao0 = areaAte(k0);

let data = [
  {
    x: x,
    y: yPlot,
    mode: "lines",
    name: "Funcao f(x)",
    xaxis: "x",
    yaxis: "y",
    line: { width: 3 }
  },
  {
    x: x,
    y: dyPlot,
    mode: "lines",
    name: "Derivada f'(x)",
    xaxis: "x2",
    yaxis: "y2",
    line: { width: 3 }
  },
  {
    x: x,
    y: areaPlot,
    mode: "lines",
    name: "Integral acumulada",
    xaxis: "x3",
    yaxis: "y3",
    line: { width: 3 }
  },
  {
    x: regiao0.xa,
    y: regiao0.ya,
    type: "scatter",
    mode: "lines",
    fill: "toself",
    name: "Area acumulada",
    xaxis: "x",
    yaxis: "y",
    opacity: 0.25,
    line: { width: 1 }
  },
  {
    x: [x[k0]],
    y: [yPlot[k0]],
    mode: "markers",
    name: "Ponto em f(x)",
    xaxis: "x",
    yaxis: "y",
    marker: { size: 10 }
  },
  {
    x: [x[k0]],
    y: [dyPlot[k0]],
    mode: "markers",
    name: "Ponto na derivada",
    xaxis: "x2",
    yaxis: "y2",
    marker: { size: 10 }
  },
  {
    x: [x[k0]],
    y: [areaPlot[k0]],
    mode: "markers",
    name: "Ponto na integral",
    xaxis: "x3",
    yaxis: "y3",
    marker: { size: 10 }
  }
];

// =====================
// LAYOUT
// =====================

let tituloEscala = normalizar ? "curvas normalizadas para comparacao visual" : "escalas reais";
let titulo = "Calculo em movimento - " + nomeFuncao() + " (" + tituloEscala + ")";

let layout = {
  title: {
    text: titulo,
    font: { size: 18 }
  },

  grid: {
    rows: 3,
    columns: 1,
    pattern: "independent"
  },

  height: 820,

  margin: {
    l: 70,
    r: 30,
    t: 90,
    b: 70
  },

  xaxis: {
    title: "x",
    domain: [0, 1],
    anchor: "y"
  },
  yaxis: {
    title: "f(x)",
    domain: [0.70, 1.00],
    zeroline: true
  },

  xaxis2: {
    title: "x",
    domain: [0, 1],
    anchor: "y2"
  },
  yaxis2: {
    title: "f'(x)",
    domain: [0.36, 0.64],
    zeroline: true
  },

  xaxis3: {
    title: "x",
    domain: [0, 1],
    anchor: "y3"
  },
  yaxis3: {
    title: "Integral acumulada",
    domain: [0.02, 0.30],
    zeroline: true
  },

  legend: {
    orientation: "h",
    x: 0,
    y: -0.12
  },

  annotations: [
    {
      x: 0,
      y: 1.10,
      xref: "paper",
      yref: "paper",
      showarrow: false,
      align: "left",
      text:
        "Leitura: a funcao mostra o comportamento; a derivada mostra a inclinacao; a integral mostra o acumulado."
    }
  ],

  updatemenus: [
    {
      type: "buttons",
      direction: "left",
      x: 0,
      y: 1.18,
      xanchor: "left",
      yanchor: "top",
      buttons: [
        {
          label: "Play",
          method: "animate",
          args: [
            null,
            {
              frame: { duration: 80, redraw: true },
              transition: { duration: 0 },
              fromcurrent: true,
              mode: "immediate"
            }
          ]
        },
        {
          label: "Pause",
          method: "animate",
          args: [
            [null],
            {
              frame: { duration: 0, redraw: false },
              transition: { duration: 0 },
              mode: "immediate"
            }
          ]
        },
        {
          label: "Ver tudo",
          method: "restyle",
          args: ["visible", [true, true, true, true, true, true, true]]
        },
        {
          label: "So funcao",
          method: "restyle",
          args: ["visible", [true, false, false, true, true, false, false]]
        },
        {
          label: "So derivada",
          method: "restyle",
          args: ["visible", [false, true, false, false, false, true, false]]
        },
        {
          label: "So integral",
          method: "restyle",
          args: ["visible", [false, false, true, false, false, false, true]]
        }
      ]
    }
  ]
};

let config = {
  responsive: true,
  displaylogo: false,
  modeBarButtonsToRemove: ["lasso2d", "select2d"]
};

return {
  data: data,
  layout: layout,
  frames: frames,
  config: config
};

`;

<script>
function salvarCloneJSPlotly() {
  // Captura o código do usuário e escapa com segurança
  const codigoNovo = editor.getValue()
    .replace(/\\/g, '\\\\')
    .replace(/`/g, '\\`')
    .replace(/\$/g, '\\$');

  // Substitui diretamente o valor da variável codigoPadrao na string
  const novaDefinicao = 'var codigoPadrao = `' + codigoNovo + '`;';
  
  // Extrai o HTML original em partes
  const htmlOriginal = document.documentElement.outerHTML;

  const htmlAtualizado = htmlOriginal.replace(
    /var codigoPadrao = `([\s\S]*?)`;/,
    novaDefinicao
  );

  const blob = new Blob([htmlAtualizado], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "JSPlotly.html";
  a.click();
}

function abrirNoChartStudio() {
  const gd = document.getElementById('grafico');
  if (!gd || !gd.data || gd.data.length === 0) {
    alert("Não há gráfico para enviar. Clique em 'add' primeiro.");
    return;
  }

  const dataStr   = JSON.stringify(gd.data || []);
  const layoutStr = JSON.stringify(gd.layout || {});

  // Tenta GET quando o payload é pequeno (URLs muito grandes podem falhar)
  const urlBase = "https://chart-studio.plotly.com/create/";
  const urlGET  = urlBase
    + "?plotlyData="   + encodeURIComponent(dataStr)
    + "&plotlyLayout=" + encodeURIComponent(layoutStr);

  if ((dataStr.length + layoutStr.length) < 1500) {
    window.open(urlGET, "_blank");
    return;
  }

  // Fallback: POST via form oculto (evita limite de URL)
  const form = document.createElement("form");
  form.method = "POST";
  form.action = urlBase;     // Editor do Chart Studio
  form.target = "_blank";

  const inpData = document.createElement("input");
  inpData.type = "hidden";
  inpData.name = "plotlyData";
  inpData.value = dataStr;

  const inpLayout = document.createElement("input");
  inpLayout.type = "hidden";
  inpLayout.name = "plotlyLayout";
  inpLayout.value = layoutStr;

  form.appendChild(inpData);
  form.appendChild(inpLayout);
  document.body.appendChild(form);
  form.submit();
  document.body.removeChild(form);
}


</script>
